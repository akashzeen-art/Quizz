spring:
  application:
    name: skill-quiz-api
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/skill_quiz}
      auto-index-creation: true
  servlet:
    multipart:
      max-file-size: 12MB
      max-request-size: 14MB

server:
  port: ${PORT:8080}

app:
  cors:
    origins: ${CORS_ORIGINS:http://localhost:5173}
  upload:
    dir: uploads
  jwt:
    secret: ${JWT_SECRET:nserve-quiz-dev-secret-key-min-32-chars!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  wallet:
    quiz-start-cost: ${WALLET_QUIZ_START_COST:10}
    entitlement-hours: ${WALLET_ENTITLEMENT_HOURS:24}
  face:
    service-url: ${FACE_SERVICE_URL:http://localhost:8001}
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    verify-service-sid: ${TWILIO_VERIFY_SERVICE_SID:}
    mock-enabled: ${TWILIO_MOCK_ENABLED:false}
    mock-code: ${TWILIO_MOCK_CODE:123456}
  admin:
    active-window-minutes: ${ADMIN_ACTIVE_MINUTES:15}
    seed-email: ${ADMIN_SEED_EMAIL:admin@gmail.com}
    seed-password: ${ADMIN_SEED_PASSWORD:Admin@123}
