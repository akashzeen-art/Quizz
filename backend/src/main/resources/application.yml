spring:
  application:
    name: skill-quiz-api
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/skill_quiz}
      auto-index-creation: true
  servlet:
    multipart:
      # Question media + PDF/DOC source uploads
      max-file-size: 12MB
      max-request-size: 14MB

server:
  # Render/Heroku set PORT; local dev uses 8080
  port: ${PORT:8080}

app:
  cors:
    origins: ${CORS_ORIGINS:http://localhost:5173}
  upload:
    dir: uploads
  jwt:
    # Min 32 chars. In production set JWT_SECRET (never commit real secrets).
    secret: ${JWT_SECRET:nserve-quiz-admin-jwt-secret-key-min-32-chars!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  google:
    # Same OAuth 2.0 Web Client ID as VITE_GOOGLE_CLIENT_ID on the frontend.
    client-id: ${GOOGLE_CLIENT_ID:}
  wallet:
    # Credits deducted once per quiz start (see POST /quiz/deduct-credits).
    quiz-start-cost: ${WALLET_QUIZ_START_COST:10}
    # How long GET /quiz/{id} + submit-answer stay authorized after deduct.
    entitlement-hours: ${WALLET_ENTITLEMENT_HOURS:24}
  admin:
    active-window-minutes: ${ADMIN_ACTIVE_MINUTES:15}
    # Only used when no admin exists yet (first boot). Change in production via env.
    seed-email: ${ADMIN_SEED_EMAIL:admin@gmail.com}
    seed-password: ${ADMIN_SEED_PASSWORD:Admin@123}
